version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: nxtwave-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nxtwave_lms
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nxtwave-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/nxtwave_lms?schema=public
      - JWT_SECRET=nxtwave-super-secret-key-2026
      - REFRESH_SECRET=nxtwave-refresh-secret-key-2026
      - CLIENT_URL=http://localhost:5173
      - NODE_ENV=production
    depends_on:
      - db

  frontend:
    image: node:20-alpine
    container_name: nxtwave-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      - VITE_API_URL=http://localhost:5000/api
      - VITE_SOCKET_URL=http://localhost:5000
    depends_on:
      - backend

volumes:
  pgdata:
