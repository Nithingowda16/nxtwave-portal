databases:
  # 1. Managed PostgreSQL Database
  - name: nxtwave-postgres
    databaseName: nxtwave_lms
    user: postgres
    plan: free

services:
  # 2. Node.js Backend Web Service
  - type: web
    name: nxtwave-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma db push && node dist/prisma/seed.js && node dist/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nxtwave-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CLIENT_URL
        value: "*" # Allow sockets/CORS requests from any client URL initially

  # 3. Vite React Frontend Static Site
  - type: web
    name: nxtwave-frontend
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      # Redirect all routes to index.html for React Router SPA support
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://nxtwave-backend.onrender.com/api # Replace with your custom backend URL if different
      - key: VITE_SOCKET_URL
        value: https://nxtwave-backend.onrender.com # Replace with your custom backend URL if different
